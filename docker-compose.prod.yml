services:
  redis:
    image: redis:7-alpine@sha256:7aec734b2bb298a1d769fd8729f13b8514a41bf90fcdd1f38ec52267fbaa8ee6
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    # SPELIX_WEB_PROCESS suppresses the streaq heartbeat loop when the web
    # process enters `async with worker:` for enqueueing — otherwise a dead
    # worker container would be masked by the web process's own heartbeat
    # writes. See app/workers/streaq_worker.py lifespan docstring.
    environment:
      - SPELIX_WEB_PROCESS=1
    env_file:
      - .env.prod
    # Bind-mount the threshold config and PDF template from the host repo.
    # The Dockerfile only copies backend/app/ into the image, so config/ and
    # reports/ (which live at the repo root, outside the build context) are
    # not in the image.
    # ThresholdConfig() resolves to /app/config/thresholds_v1.json via
    # Path.cwd() in app/config.py. PDFService resolves the template via
    # backend/app/services/pdf.py → ../../../reports/templates/ → /app/reports/templates/.
    # Read-only because neither service should mutate these files at runtime.
    volumes:
      - ./config:/app/config:ro
      - ./reports/templates:/app/reports/templates:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["uv", "run", "--no-dev", "streaq", "run", "app.workers.streaq_worker:worker"]
    env_file:
      - .env.prod
    volumes:
      - ./config:/app/config:ro
      - ./reports/templates:/app/reports/templates:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data: